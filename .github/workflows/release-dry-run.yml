name: Release dry run

on:
  workflow_dispatch:
  pull_request:
    paths:
      - releasebox.config.json
      - package.json
      - package-lock.json
      - .github/workflows/release*.yml

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install ReleaseBox
        run: |
          git clone --depth 1 --branch v0.1.0 https://github.com/rogerchappel/releasebox.git /tmp/releasebox
          cd /tmp/releasebox
          npm ci
          npm run build

      - name: ReleaseBox check
        run: node /tmp/releasebox/bin/releasebox.js check .

      - name: Run release check
        run: npm run release:check

      - name: Generate ReleaseBox notes preview
        run: node /tmp/releasebox/bin/releasebox.js notes . > release-notes-preview.md

      - name: Upload ReleaseBox notes preview
        uses: actions/upload-artifact@v7
        with:
          name: release-notes-preview
          path: release-notes-preview.md
          if-no-files-found: error
